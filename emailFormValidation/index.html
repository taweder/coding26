<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Mail Form</title>

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <header class="bg-dark text-white text-center p-5">
        <div class="container p-5">
            <div class="row">
                <div class="col-sm-12">
                    <h1>Mail Forms</h1>
                    <p>Making a functional contact form</p>
                </div>
            </div>
        </div>
    </header>



    <!--------------------------Contact--------------------->
    <section class="p-5">
        <div class="container">
            <div class="row">
                <div class="col-sm-6 mx-auto">

                    <!--Form with the input fields for the user-->
                    <form class="needs-validation" action="email.php" method="post" novalidate>

                        <div class="mb-3 mt-3">
                            <label for="formFirst" class="form-label">First Name:</label>

                            <input type="text" class="form-control" id="formFirst" placeholder="Enter First Name"
                                name="formFirst" required>

                            <div class="valid-feedback">Valid.</div>
                            <div class="invalid-feedback">Please enter your first name</div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="formLast" class="form-label">Last Name:</label>

                            <input type="text" class="form-control" id="formLast" placeholder="Enter Last Name"
                                name="formLast" required>
                            <div class="valid-feedback">Valid.</div>
                            <div class="invalid-feedback">Please enter your last name</div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="formEmail" class="form-label">Email:</label>

                            <input type="email" class="form-control" id="formEmail" placeholder="Enter Last Name"
                                name="formEmail" required>

                            <div class="valid-feedback">Valid.</div>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="comment">Comments:</label>
                            <textarea class="form-control" rows="5" id="comment" name="text" required></textarea>

                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </div>
                    </form>

                </div>
            </div><!--ends row-->

        </div><!--ends container-->
    </section>

    <!--link to external JS File-->
    <script src="js/mail.js"></script>


</body>

</html>
